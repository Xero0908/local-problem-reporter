<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="700" viewBox="0 0 900 700">
  <rect width="100%" height="100%" fill="#ffffff"/>
  <style>text{font-family:'Times New Roman', serif; font-size:13px}</style>
  <text x="10" y="20" font-weight="700">Flowchart — Issue Reporting</text>

  <rect x="340" y="60" width="220" height="50" rx="6" fill="#fff7e6" stroke="#f57c00"/>
  <text x="450" y="95" text-anchor="middle">Start / Open Report Form</text>

  <rect x="340" y="140" width="220" height="50" rx="6" fill="#fff" stroke="#333"/>
  <text x="450" y="175" text-anchor="middle">Enter details & attach photo</text>

  <rect x="340" y="220" width="220" height="50" rx="6" fill="#fff" stroke="#333"/>
  <text x="450" y="255" text-anchor="middle">Validate inputs</text>

  <polygon points="450,280 490,320 450,360 410,320" fill="#fff" stroke="#333"/>
  <text x="450" y="325" text-anchor="middle">Valid?</text>

  <rect x="340" y="420" width="220" height="50" rx="6" fill="#f3e5f5" stroke="#7b1fa2"/>
  <text x="450" y="455" text-anchor="middle">Submit to Server</text>

  <rect x="340" y="520" width="220" height="50" rx="6" fill="#e8f5e9" stroke="#27ae60"/>
  <text x="450" y="555" text-anchor="middle">Confirmation / Notification</text>

  <rect x="110" y="320" width="200" height="50" rx="6" fill="#ffecec" stroke="#e74c3c"/>
  <text x="210" y="355" text-anchor="middle" fill="#e74c3c">Show validation errors</text>

  <rect x="600" y="420" width="200" height="50" rx="6" fill="#fff0f0" stroke="#e74c3c"/>
  <text x="700" y="455" text-anchor="middle" fill="#e74c3c">Server Error — Retry / Log</text>

  <polygon points="450,470 490,510 450,550 410,510" fill="#fff" stroke="#333"/>
  <text x="450" y="515" text-anchor="middle">Server OK?</text>

  <defs>
    <marker id="arrf" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333" />
    </marker>
  </defs>

  <line x1="450" y1="110" x2="450" y2="140" stroke="#333" stroke-width="2" marker-end="url(#arrf)"/>
  <line x1="450" y1="190" x2="450" y2="220" stroke="#333" stroke-width="2" marker-end="url(#arrf)"/>
  <line x1="450" y1="270" x2="450" y2="280" stroke="#333" stroke-width="2" marker-end="url(#arrf)"/>

  <line x1="450" y1="360" x2="450" y2="420" stroke="#333" stroke-width="2" marker-end="url(#arrf)"/>
  <line x1="450" y1="470" x2="450" y2="520" stroke="#333" stroke-width="2" marker-end="url(#arrf)"/>
  <line x1="450" y1="570" x2="450" y2="560" stroke="#333" stroke-width="2" marker-end="url(#arrf)"/>

  <line x1="410" y1="320" x2="310" y2="320" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrf)"/>
  <line x1="310" y1="320" x2="310" y2="345" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrf)"/>

  <line x1="490" y1="510" x2="600" y2="510" stroke="#333" stroke-width="2" marker-end="url(#arrf)"/>
  <line x1="450" y1="550" x2="450" y2="570" stroke="#333" stroke-width="2" marker-end="url(#arrf)"/>

  <line x1="700" y1="480" x2="700" y2="420" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrf)"/>
  <text x="700" y="485" font-size="12" text-anchor="middle" fill="#e74c3c">No</text>
  <text x="450" y="365" font-size="12" text-anchor="middle">Yes</text>

  <text x="10" y="685" font-size="12">Notes: validation errors route back to the user; server failure is retried and logged. This flow ensures all decision branches are visible.</text>
</svg>
