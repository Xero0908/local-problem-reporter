<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="700" viewBox="0 0 1000 700">
  <rect width="100%" height="100%" fill="#ffffff"/>
  <style>text{font-family:'Times New Roman', serif; font-size:13px}</style>
  <text x="10" y="20" font-weight="700">Entity-Relationship Diagram (ERD)</text>

  <!-- Entities -->
  <rect x="60" y="60" width="220" height="120" rx="6" fill="#fff" stroke="#333"/>
  <text x="170" y="90" text-anchor="middle" font-weight="700">User</text>
  <text x="170" y="115" text-anchor="middle">user_id, name, email</text>

  <rect x="360" y="60" width="240" height="120" rx="6" fill="#fff" stroke="#333"/>
  <text x="480" y="90" text-anchor="middle" font-weight="700">Issue</text>
  <text x="480" y="115" text-anchor="middle">issue_id, title, description, status, priority</text>

  <rect x="720" y="60" width="200" height="120" rx="6" fill="#fff" stroke="#333"/>
  <text x="820" y="90" text-anchor="middle" font-weight="700">Comment</text>
  <text x="820" y="115" text-anchor="middle">comment_id, issue_id, user_id, text</text>

  <!-- Relationships -->

  <line x1="280" y1="120" x2="360" y2="120" stroke="#333" stroke-width="2" marker-end="none"/>
  <text x="320" y="135" font-size="12" text-anchor="middle">User (1) — (0..*) Issue</text>

  <line x1="600" y1="120" x2="720" y2="120" stroke="#333" stroke-width="2"/>
  <text x="660" y="135" font-size="12" text-anchor="middle">Issue (1) — (0..*) Comment</text>

  <text x="10" y="160" font-size="12">Notes: user_id in Issue is a foreign key; issue_id in Comment is a foreign key; use referential integrity and cascade rules as required.</text>

</svg>
