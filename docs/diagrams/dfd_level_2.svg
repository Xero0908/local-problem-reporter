<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="800" viewBox="0 0 1100 800">
  <rect width="100%" height="100%" fill="#ffffff"/>
  <style>text{font-family:'Times New Roman', serif; font-size:12px}</style>
  <text x="10" y="20" font-weight="700">DFD Level 2 — Detailed Diagram for Report Submission</text>

  <rect x="40" y="80" width="160" height="60" rx="6" fill="#e8f0ff" stroke="#667eea"/>
  <text x="120" y="115" text-anchor="middle">Citizen</text>

  <rect x="240" y="50" width="180" height="60" rx="6" fill="#fff7e6" stroke="#f57c00"/>
  <text x="330" y="85" text-anchor="middle">Client UI</text>

  <rect x="470" y="50" width="200" height="60" rx="6" fill="#fff7e6" stroke="#f57c00"/>
  <text x="570" y="85" text-anchor="middle">API Gateway</text>

  <rect x="720" y="50" width="220" height="60" rx="6" fill="#fff7e6" stroke="#f57c00"/>
  <text x="830" y="85" text-anchor="middle">Validation Engine</text>

  <rect x="470" y="250" width="200" height="80" rx="8" fill="#f3e5f5" stroke="#7b1fa2"/>
  <text x="570" y="290" text-anchor="middle">Issue DB</text>

  <rect x="720" y="250" width="220" height="80" rx="8" fill="#e8f5e9" stroke="#27ae60"/>
  <text x="830" y="290" text-anchor="middle">Notification Service</text>

  <rect x="960" y="260" width="120" height="60" rx="6" fill="#e8f5e9" stroke="#27ae60"/>
  <text x="1020" y="295" text-anchor="middle">City Admin</text>

  <defs>
    <marker id="arr3" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
  </defs>

  <line x1="200" y1="110" x2="240" y2="80" stroke="#333" stroke-width="2" marker-end="url(#arr3)"/>
  <text x="220" y="70" font-size="12" text-anchor="middle">Open report</text>

  <line x1="420" y1="80" x2="470" y2="80" stroke="#333" stroke-width="2" marker-end="url(#arr3)"/>
  <text x="445" y="68" font-size="12" text-anchor="middle">Send request</text>

  <line x1="670" y1="80" x2="720" y2="80" stroke="#333" stroke-width="2" marker-end="url(#arr3)"/>
  <text x="695" y="68" font-size="12" text-anchor="middle">Validate input</text>

  <line x1="830" y1="110" x2="570" y2="250" stroke="#333" stroke-width="2" marker-end="url(#arr3)"/>
  <text x="700" y="190" font-size="12" text-anchor="middle">Store issue</text>

  <line x1="830" y1="110" x2="830" y2="250" stroke="#333" stroke-width="2" marker-end="url(#arr3)"/>
  <text x="860" y="180" font-size="12" text-anchor="middle">Send alert</text>

  <line x1="830" y1="290" x2="960" y2="290" stroke="#333" stroke-width="2" marker-end="url(#arr3)"/>
  <text x="900" y="280" font-size="12" text-anchor="middle">Notify admin</text>

  <path d="M760 80 C 840 80 840 20 240 20" fill="none" stroke="#e74c3c" stroke-width="2" marker-end="url(#arr3)" stroke-dasharray="4 3"/>
  <text x="520" y="18" font-size="12" text-anchor="middle" fill="#e74c3c">Validation failed — return error to UI</text>

  <text x="10" y="780" font-size="12">Notes: Level 2 details the report submission process, including UI, API gateway, validation, persistence, and notification.</text>
</svg>
